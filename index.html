<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lausanne Nocturne — 1832–2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'DM Sans', 'Helvetica Neue', sans-serif;
  --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem,0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem,    0.95rem + 0.25vw,1.125rem);
  --text-lg:   clamp(1.125rem,1rem + 0.75vw,   1.5rem);
  --text-xl:   clamp(1.5rem,  1.2rem + 1.25vw, 2.25rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;
  --radius-xl:1rem;--radius-full:9999px;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --shadow-sm:0 1px 2px oklch(0 0 0/.25);
  --shadow-md:0 4px 16px oklch(0 0 0/.35);
  --shadow-lg:0 12px 40px oklch(0 0 0/.45);
}
:root,[data-theme="dark"]{
  --bg:#0f0e0d;--surface:#181714;--surface-2:#201e1b;--surface-3:#2a2825;
  --border:#353230;--divider:#2c2a27;
  --text:#e8e4de;--text-muted:#8c8780;--text-faint:#55524e;
  --accent:#c4954a;--accent-h:#e0ac5e;--accent-bg:oklch(from #c4954a l c h/.12);
}
[data-theme="light"]{
  --bg:#f7f5f0;--surface:#faf9f6;--surface-2:#f0ede6;--surface-3:#e8e4da;
  --border:#d4d0c8;--divider:#dedad2;
  --text:#1a1814;--text-muted:#5a5750;--text-faint:#9a9790;
  --accent:#8b5e1a;--accent-h:#a06d20;--accent-bg:oklch(from #8b5e1a l c h/.1);
}

/* ── RESET ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:var(--font-body);font-size:var(--text-base);
  color:var(--text);background:var(--bg);
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
::selection{background:var(--accent-bg);color:var(--text);}
:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:var(--radius-sm);}

/* ── HEADER ──────────────────────────────────────────── */
header{
  flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:var(--space-3) var(--space-6);
  display:flex;align-items:center;gap:var(--space-4);
  z-index:1000;box-shadow:var(--shadow-sm);
}
.logo{display:flex;align-items:center;gap:var(--space-2);text-decoration:none;}
.logo svg{width:28px;height:28px;color:var(--accent);flex-shrink:0;}
.logo-text{font-family:var(--font-display);font-style:italic;font-size:var(--text-lg);color:var(--text);white-space:nowrap;}
.logo-sub{font-size:var(--text-xs);color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:var(--space-3);}
.stat-chip{
  font-size:var(--text-xs);color:var(--text-muted);
  background:var(--surface-2);padding:var(--space-1) var(--space-3);
  border-radius:var(--radius-full);border:1px solid var(--border);
}
.stat-chip span{color:var(--accent);font-weight:600;}
.theme-toggle{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--radius-md);color:var(--text-muted);
  transition:color var(--transition),background var(--transition);
}
.theme-toggle:hover{color:var(--text);background:var(--surface-2);}

/* ── CONTROLS ────────────────────────────────────────── */
#controls{
  flex-shrink:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:var(--space-4) var(--space-6);
  display:flex;align-items:flex-start;flex-wrap:wrap;gap:var(--space-5);
  z-index:900;
}
.slider-section{display:flex;flex-direction:column;gap:var(--space-2);flex:1;min-width:220px;}
.slider-label{display:flex;justify-content:space-between;align-items:baseline;font-size:var(--text-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
.year-display{font-family:var(--font-display);font-style:italic;font-size:var(--text-xl);color:var(--accent);line-height:1;}
#yearSlider{
  width:100%;-webkit-appearance:none;appearance:none;height:4px;
  background:linear-gradient(to right,var(--accent) var(--pct,0%),var(--surface-3) var(--pct,0%));
  border-radius:var(--radius-full);outline:none;cursor:pointer;margin:var(--space-2) 0;
}
#yearSlider::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--accent);border:3px solid var(--bg);box-shadow:var(--shadow-sm);
  transition:transform var(--transition);
}
#yearSlider:hover::-webkit-slider-thumb{transform:scale(1.2);}
#yearSlider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;background:var(--accent);
  border:3px solid var(--bg);box-shadow:var(--shadow-sm);cursor:pointer;
}
.year-ticks{display:flex;justify-content:space-between;font-size:var(--text-xs);color:var(--text-faint);}
.filters-section{display:flex;flex-direction:column;gap:var(--space-2);}
.filters-label{font-size:var(--text-xs);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;}
.filters-row{display:flex;flex-wrap:wrap;gap:var(--space-2);}
.cat-btn{
  display:flex;align-items:center;gap:var(--space-2);
  padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);
  border:1.5px solid var(--border);background:var(--surface-2);
  font-size:var(--text-xs);color:var(--text-muted);
  transition:all var(--transition);user-select:none;white-space:nowrap;
}
.cat-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--cat-color,var(--text-faint));flex-shrink:0;transition:transform var(--transition);}
.cat-btn.active{border-color:var(--cat-color,var(--accent));background:oklch(from var(--cat-color,var(--accent)) l c h/.15);color:var(--text);}
.cat-btn.active .dot{transform:scale(1.3);}
.cat-btn:hover{border-color:var(--cat-color,var(--accent));color:var(--text);}
.cat-btn:disabled,.cat-btn[disabled]{opacity:.3;pointer-events:none;}

/* ── MAP ─────────────────────────────────────────────── */
#map-wrap{
  flex:1 1 auto;
  min-height:0;
  position:relative;
  overflow:hidden;
}
#map{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* ── LEAFLET OVERRIDES ───────────────────────────────── */
.leaflet-container{background:var(--bg);}
.leaflet-popup-content-wrapper{
  background:var(--surface-2);color:var(--text);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);padding:0;
}
.leaflet-popup-content{margin:0;padding:var(--space-4);min-width:200px;}
.leaflet-popup-tip{background:var(--surface-2);}
.leaflet-popup-close-button{color:var(--text-muted)!important;font-size:18px!important;top:var(--space-2)!important;right:var(--space-3)!important;}
.leaflet-popup-close-button:hover{color:var(--text)!important;}
.leaflet-control-zoom a{background:var(--surface-2)!important;color:var(--text)!important;border-color:var(--border)!important;}
.leaflet-control-zoom a:hover{background:var(--surface-3)!important;}
.leaflet-control-attribution{background:oklch(from var(--bg) l c h/.85)!important;color:var(--text-faint)!important;font-size:10px!important;}
.leaflet-control-attribution a{color:var(--text-muted)!important;}

.popup-header{border-bottom:1px solid var(--divider);padding-bottom:var(--space-3);margin-bottom:var(--space-3);}
.popup-name{font-family:var(--font-display);font-style:italic;font-size:var(--text-lg);color:var(--text);line-height:1.2;}
.popup-cat{display:inline-flex;align-items:center;gap:var(--space-1);margin-top:var(--space-1);font-size:var(--text-xs);padding:2px 8px;border-radius:var(--radius-full);font-weight:500;}
.popup-row{display:flex;gap:var(--space-2);font-size:var(--text-sm);color:var(--text-muted);margin-bottom:var(--space-1);}
.popup-row strong{color:var(--text);font-weight:500;flex-shrink:0;}
.popup-precision{margin-top:var(--space-3);font-size:var(--text-xs);color:var(--text-faint);display:flex;align-items:center;gap:var(--space-1);}
.precision-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.prec-adresse{background:#6daa45;}.prec-ville{background:#da7101;}.prec-null{background:var(--text-faint);}

/* ── EMPTY STATE ─────────────────────────────────────── */
#empty-state{
  display:none;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;color:var(--text-muted);
  pointer-events:none;z-index:500;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-xl);padding:var(--space-8);box-shadow:var(--shadow-md);
}
#empty-state svg{margin:0 auto var(--space-4);color:var(--text-faint);}
#empty-state h3{font-family:var(--font-display);font-style:italic;font-size:var(--text-lg);color:var(--text);margin-bottom:var(--space-2);}

/* ── LEGEND ──────────────────────────────────────────── */
#legend{
  position:absolute;bottom:var(--space-6);right:var(--space-4);z-index:800;
  background:oklch(from var(--surface) l c h/.92);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:var(--space-3) var(--space-4);backdrop-filter:blur(8px);
  box-shadow:var(--shadow-md);font-size:var(--text-xs);
}
.legend-title{color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--space-2);}
.legend-item{display:flex;align-items:center;gap:var(--space-2);color:var(--text-muted);margin-bottom:var(--space-1);}
.legend-item:last-child{margin-bottom:0;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── LOADING ─────────────────────────────────────────── */
#loading{
  display:flex;position:fixed;inset:0;z-index:2000;
  background:var(--bg);align-items:center;justify-content:center;
  flex-direction:column;gap:var(--space-4);
  transition:opacity .5s ease;
}
#loading.fade-out{opacity:0;pointer-events:none;}
.spinner{width:40px;height:40px;border:3px solid var(--surface-3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading p{font-size:var(--text-sm);color:var(--text-muted);}

/* ── RESPONSIVE ──────────────────────────────────────── */
@media(max-width:640px){
  header{padding:var(--space-2) var(--space-4);}
  .logo-sub{display:none;}
  #controls{padding:var(--space-3) var(--space-4);gap:var(--space-3);}
  .slider-section{min-width:100%;}
  .filters-section{min-width:100%;}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Chargement des données historiques…</p>
</div>

<header>
  <a href="#" class="logo" aria-label="Lausanne Nocturne">
    <svg viewBox="0 0 28 28" fill="none" aria-hidden="true">
      <circle cx="14" cy="14" r="11" stroke="currentColor" stroke-width="1.5"/>
      <path d="M14 6 C14 6 10 10 10 14 C10 18 14 20 14 20 C14 20 18 18 18 14 C18 10 14 6 14 6Z" fill="currentColor" opacity="0.25"/>
      <circle cx="14" cy="14" r="2.5" fill="currentColor"/>
      <path d="M6.5 14 H21.5 M14 6.5 V21.5" stroke="currentColor" stroke-width="1" opacity="0.4"/>
    </svg>
    <div>
      <div class="logo-text">Lausanne Nocturne</div>
      <div class="logo-sub">1832 — 2026</div>
    </div>
  </a>
  <div class="header-right">
    <div class="stat-chip"><span id="countNum">—</span> lieux affichés</div>
    <button class="theme-toggle" data-theme-toggle aria-label="Basculer le thème">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<div id="controls">
  <div class="slider-section">
    <div class="slider-label">
      <span>Période historique</span>
      <div class="year-display" id="yearDisplay">1832</div>
    </div>
    <input type="range" id="yearSlider" min="0" max="4" step="1" value="0" aria-label="Sélectionner la période">
    <div class="year-ticks" id="yearTicks"></div>
  </div>
  <div class="filters-section">
    <div class="filters-label">Catégories</div>
    <div class="filters-row" id="catFilters"></div>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>

  <div id="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <h3>Aucun résultat</h3>
    <p>Aucun lieu ne correspond<br>aux filtres sélectionnés.</p>
  </div>

  <div id="legend">
    <div class="legend-title">Précision</div>
    <div class="legend-item"><div class="legend-dot" style="background:#6daa45"></div>Adresse exacte</div>
    <div class="legend-item"><div class="legend-dot" style="background:#da7101"></div>Ville (approx.)</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const PERIODS = [
  { year:1832, label:'1832', file:'1832.geojson' },
  { year:1888, label:'1888', file:'1888.geojson' },
  { year:1923, label:'1923', file:'1923.geojson' },
  { year:1951, label:'1951', file:'1951.geojson' },
  { year:2026, label:'2026', file:'2026.geojson' },
];

// Catégories normalisées du site avec leurs couleurs
const CAT_COLORS = {
  'Bar / Café':              '#c4954a',
  'Restaurant':              '#6daa45',
  'Hôtel / Pension':         '#5591c7',
  'Brasserie':               '#da7101',
  'Spectacle / Sociabilité': '#a86fdf',
  'Club / Société':          '#d19900',
  'Club / Discothèque':      '#dd6974',
  'Autre':                   '#7a7974',
};

// ═══════════════════════════════════════════════════════
//  MAPPING DES CATÉGORIES GEOJSON → CATÉGORIES DU SITE
// ═══════════════════════════════════════════════════════
function normaliserCategorie(properties, annee) {

  // ── 1832 ─────────────────────────────────────────────
  if (annee === 1832) {
    const t = (properties.typesimplifie1832 || '').trim();
    const map = {
      'Hôtel Auberge':          'Hôtel / Pension',
      'Htel Auberge':           'Hôtel / Pension',  // sans accent
      'Débit de boisson':        'Bar / Café',
      'Dbit de boisson':         'Bar / Café',       // sans accent
      'Café-billard':            'Bar / Café',
      'Caf-billard':             'Bar / Café',       // sans accent
      'Traiteur Restaurant':     'Restaurant',
      'Brasserie':               'Brasserie',
      'Spectacle Sociabilité':   'Spectacle / Sociabilité',
      'Spectacle Sociabilit':    'Spectacle / Sociabilité', // sans accent
    };
    return map[t] || 'Autre';
  }

  // ── 1888 ─────────────────────────────────────────────
  if (annee === 1888) {
    const t = (properties.typesimplifie || '').trim();
    const map = {
      'Café':       'Bar / Café',
      'Caf':        'Bar / Café',        // sans accent
      'Pinte':      'Bar / Café',
      'Cabaret':    'Bar / Café',
      'Hôtel':      'Hôtel / Pension',
      'Hotel':      'Hôtel / Pension',   // sans accent
      'Auberge':    'Hôtel / Pension',
      'Pension':    'Hôtel / Pension',
      'Restaurant': 'Restaurant',
      'Brasserie':  'Brasserie',
      'Théâtre':    'Spectacle / Sociabilité',
      'Theatre':    'Spectacle / Sociabilité', // sans accent
      'Cercle':     'Club / Société',
    };
    return map[t] || 'Autre';
  }

  // ── 1923 ─────────────────────────────────────────────
  if (annee === 1923) {
    const t = (properties.type_simplifie || properties.typesimplifie || '').trim();
    const map = {
      'Hôtel Auberge':          'Hôtel / Pension',
      'Htel Auberge':           'Hôtel / Pension',
      'Débit de boisson':        'Bar / Café',
      'Dbit de boisson':         'Bar / Café',
      'Café-billard':            'Bar / Café',
      'Caf-billard':             'Bar / Café',
      'Traiteur Restaurant':     'Restaurant',
      'Brasserie':               'Brasserie',
      'Spectacle Sociabilité':   'Spectacle / Sociabilité',
      'Spectacle Sociabilit':    'Spectacle / Sociabilité',
      'Cercle Club Société':     'Club / Société',
      'Cercle Club Socit':      'Club / Société',
    };
    return map[t] || 'Autre';
  }

  // ── 1951 ─────────────────────────────────────────────
  if (annee === 1951) {
    const t = (properties.typesimplifie1951 || '').trim();
    const map = {
      'Hôtel Auberge':         'Hôtel / Pension',
      'Hotel Auberge':         'Hôtel / Pension',
      'Café Bar':              'Bar / Café',
      'Caf Bar':               'Bar / Café',      // sans accent
      'Restaurant Traiteur':   'Restaurant',
      'Brasserie':             'Brasserie',
      'Café-Billard':          'Bar / Café',
      'Caf-Billard':           'Bar / Café',      // sans accent
      'Théâtre Spectacle':     'Spectacle / Sociabilité',
      'Thtre Spectacle':       'Spectacle / Sociabilité', // sans accent
      'Cercle Club Société':   'Club / Société',
      'Cercle Club Socit':    'Club / Société',   // sans accent
    };
    return map[t] || 'Autre';
  }

  // ── 2026 (OpenStreetMap) ──────────────────────────────
  if (annee === 2026) {
    const tourism = (properties.tourism || '').trim().toLowerCase();
    if (tourism === 'hotel' || tourism === 'hostel') return 'Hôtel / Pension';
    const a = (properties.amenity || '').trim().toLowerCase();
    const map = {
      'restaurant': 'Restaurant',
      'cafe':       'Bar / Café',
      'bar':        'Bar / Café',
      'pub':        'Bar / Café',
      'nightclub':  'Club / Discothèque',
      'theatre':    'Spectacle / Sociabilité',
      'cinema':     'Spectacle / Sociabilité',
      'hotel':      'Hôtel / Pension',
      'hostel':     'Hôtel / Pension',
    };
    return map[a] || 'Autre';
  }

  return 'Autre';
}

// ═══════════════════════════════════════════════════════
//  EXTRACTION DES PROPRIÉTÉS SELON L'ANNÉE
// ═══════════════════════════════════════════════════════
function extractProps(props, y) {
  let nom, metier, adresse, catRaw, precision;

  if (y === 1832) {
    nom      = props.nom || '—';
    metier   = props.metier || '';
    adresse  = props.adressebrute || props['adresse_brute'] || '';
    catRaw   = props.typesimplifie1832 || '';
    precision= props.geocodageprecision || props['geocodage_precision'] || null;
  } else if (y === 1888) {
    nom      = props.owner || '—';
    metier   = props.use || '';
    adresse  = props.adressecomplete || props['adresse_complete'] || '';
    catRaw   = props.typesimplifie || '';
    precision= null;
  } else if (y === 1923) {
    nom      = props.nom || '—';
    metier   = props.metier || '';
    adresse  = props['adresse_brute'] || props.adressebrute || '';
    catRaw   = props['type_simplifie'] || props.type_simplifie || '';
    precision= props['geocodage_precision'] || props.geocodage_precision || null;
  } else if (y === 1951) {
    nom      = props.nom || '—';
    metier   = props.profession || '';
    adresse  = props.lignebrute || props.adresse || '';
    catRaw   = props.typesimplifie1951 || '';
    precision= props.geocodageprecision || null;
  } else if (y === 2026) {
    nom      = props.name || '—';
    metier   = props.amenity || '';
    const num= props['addr:housenumber'] || props.addrhousenumber || '';
    const rue= props['addr:street']      || props.addrstreet      || '';
    adresse  = [num, rue].filter(Boolean).join(' ') || '';
    catRaw   = props.amenity || '';
    precision= 'adresse';
  }

  const catNorm = normaliserCategorie(props, y);
  return { nom, metier, adresse, catRaw, catNorm, precision };
}

// ═══════════════════════════════════════════════════════
//  ÉTAT
// ═══════════════════════════════════════════════════════
const state = {
  periodIdx: 0,
  activeCats: new Set(Object.keys(CAT_COLORS)),
  data: {},
  loaded: new Set(),
};

// ═══════════════════════════════════════════════════════
//  CARTE
// ═══════════════════════════════════════════════════════
const map = L.map('map', { center:[46.521, 6.631], zoom:14 });
let tileBase, tileLabels;
// place to keep optional historic GeoTIFF overlays (year -> layer)
const geoTiffOverlays = {};
let overlaysControl = null;

function setTiles() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (tileBase)   map.removeLayer(tileBase);
  if (tileLabels) map.removeLayer(tileLabels);
  const baseUrl = dark
    ? 'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png';
  const labUrl = dark
    ? 'https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png';
  const attr = '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank">OSM</a> &copy; <a href="https://carto.com/attributions" target="_blank">CARTO</a>';
  tileBase   = L.tileLayer(baseUrl, { attribution:attr, subdomains:'abcd', maxZoom:19 }).addTo(map);
  tileLabels = L.tileLayer(labUrl,  { attribution:'',   subdomains:'abcd', maxZoom:19 }).addTo(map);
}
setTiles();

const markersLayer = L.layerGroup().addTo(map);

// PNG overlay loader using pre-computed bounds from bounds.json
// Expected files: assets/images/{year}.png + bounds in assets/images/bounds.json

async function loadImageOverlays() {
  const overlays = {};
  
  try {
    // Load bounds from JSON file
    const boundsResp = await fetch('./assets/images/bounds.json');
    if (!boundsResp.ok) {
      console.warn('[Overlay] bounds.json not found');
      return;
    }
    
    const boundsData = await boundsResp.json();
    console.log('[Overlay] Loaded bounds:', boundsData);
    
    // For each period, try to load PNG with bounds from JSON
    for (const p of PERIODS) {
      const imageUrl = `./assets/images/${p.label}.png`;
      const boundsKey = p.label;
      
      // Check if we have bounds for this year
      if (!boundsData[boundsKey]) {
        console.debug(`[Overlay] No bounds for ${p.label}`);
        continue;
      }
      
      const bounds = boundsData[boundsKey];
      
      try {
        console.log(`[Overlay] Attempting to load ${p.label}...`);
        
        // Fetch the image
        const imgResp = await fetch(imageUrl);
        if (!imgResp.ok) {
          console.warn(`[Overlay] PNG not found for ${p.label}: ${imgResp.status}`);
          continue;
        }
        
        // Create image overlay with bounds from JSON
        const overlay = L.imageOverlay(imageUrl, bounds, {
          opacity: 0.7,
          interactive: false,
          className: `overlay-${p.label}`
        });
        
        overlays[`${p.label} (Carte historique)`] = overlay;
        
        console.log(`✓ [Overlay] Successfully loaded overlay for ${p.label}`, { bounds });
        
      } catch (err) {
        console.error(`✗ [Overlay] Failed to load overlay for ${p.label}:`, err.message);
      }
    }
    
    // Add layers control if we loaded any overlays
    if (Object.keys(overlays).length > 0) {
      overlaysControl = L.control.layers(null, overlays, { collapsed: false }).addTo(map);
      console.log(`✓ [Overlay] Added ${Object.keys(overlays).length} overlay(s) to layers control`);
    } else {
      console.warn('[Overlay] No overlays were loaded');
    }
    
  } catch (err) {
    console.error('[Overlay] Error in loadImageOverlays:', err.message);
  }
}

// Delay loading overlays to ensure map is ready
setTimeout(() => {
  console.log('[Overlay] Starting overlay loader...');
  loadImageOverlays();
}, 500);

// ═══════════════════════════════════════════════════════
//  CHARGEMENT GEOJSON
// ═══════════════════════════════════════════════════════
async function loadPeriod(p) {
  if (state.loaded.has(p.year)) return;
  try {
    const r = await fetch(`./assets/data/${p.file}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const gj = await r.json();
    state.data[p.year] = gj.features || [];
  } catch(e) {
    console.warn(`Impossible de charger ${p.file}:`, e.message);
    state.data[p.year] = [];
  }
  state.loaded.add(p.year);
}

// ═══════════════════════════════════════════════════════
//  RENDU MARQUEURS
// ═══════════════════════════════════════════════════════
function esc(s) {
  return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
}

function buildPopup(props, y) {
  const { nom, metier, adresse, catRaw, catNorm, precision } = extractProps(props, y);
  const color     = CAT_COLORS[catNorm] || '#7a7974';
  const precClass = precision==='adresse' ? 'prec-adresse' : precision==='ville' ? 'prec-ville' : 'prec-null';
  const precLabel = precision==='adresse' ? 'Adresse exacte' : precision==='ville' ? 'Position approchée' : 'Précision inconnue';
  return `
    <div class="popup-header">
      <div class="popup-name">${esc(nom)}</div>
      ${metier ? `<span class="popup-cat" style="background:${color}22;color:${color};border:1px solid ${color}55">${esc(metier)}</span>` : ''}
    </div>
    ${adresse ? `<div class="popup-row"><strong>Adresse</strong>${esc(adresse)}</div>` : ''}
    <div class="popup-row"><strong>Catégorie</strong>${esc(catNorm)}</div>
    <div class="popup-row"><strong>Période</strong>${y}</div>
    ${precision !== null ? `<div class="popup-precision"><div class="precision-dot ${precClass}"></div>${precLabel}</div>` : ''}
  `;
}

function renderMarkers() {
  markersLayer.clearLayers();
  const period   = PERIODS[state.periodIdx];
  const features = state.data[period.year] || [];
  let count = 0;

  features.forEach(f => {
    if (!f.geometry?.coordinates) return;
    const [lng, lat] = f.geometry.coordinates;
    if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;

    const props    = f.properties || {};
    const { catNorm, precision } = extractProps(props, period.year);
    if (!state.activeCats.has(catNorm)) return;

    const color   = CAT_COLORS[catNorm] || '#7a7974';
    const fallback = precision === 'ville';
    const r = fallback ? 6 : 7;

    const m = L.circleMarker([lat, lng], {
      radius:r, color, weight:fallback ? 1.5 : 2,
      opacity:fallback ? .55 : .9,
      fillColor:color, fillOpacity:fallback ? .35 : .75,
      dashArray:fallback ? '4 3' : null,
    });

    m.bindPopup(buildPopup(props, period.year), { maxWidth:280 });
    m.on('mouseover', function(){ this.setStyle({ radius:r+2, fillOpacity:.95, opacity:1 }); this.openPopup(); });
    m.on('mouseout',  function(){ this.setStyle({ radius:r, fillOpacity:fallback?.35:.75, opacity:fallback?.55:.9 }); });
    markersLayer.addLayer(m);
    count++;
  });

  document.getElementById('countNum').textContent = count.toLocaleString('fr-CH');
  document.getElementById('empty-state').style.display = count === 0 ? 'block' : 'none';
}

// ═══════════════════════════════════════════════════════
//  UI — SLIDER
// ═══════════════════════════════════════════════════════
function initSlider() {
  const slider  = document.getElementById('yearSlider');
  const display = document.getElementById('yearDisplay');
  const ticks   = document.getElementById('yearTicks');
  ticks.innerHTML = PERIODS.map(p => `<span>${p.label}</span>`).join('');

  const update = () => {
    const pct = (slider.value / slider.max) * 100;
    slider.style.setProperty('--pct', pct + '%');
    display.textContent = PERIODS[slider.value].label;
  };
  update();

  slider.addEventListener('input', async () => {
    state.periodIdx = +slider.value;
    update();
    await loadPeriod(PERIODS[state.periodIdx]);
    renderMarkers();
    refreshCatButtons();
  });
}

// ═══════════════════════════════════════════════════════
//  UI — FILTRES
// ═══════════════════════════════════════════════════════
function initCatFilters() {
  const container = document.getElementById('catFilters');
  Object.entries(CAT_COLORS).forEach(([cat, color]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn active';
    btn.dataset.cat = cat;
    btn.style.setProperty('--cat-color', color);
    btn.innerHTML = `<div class="dot"></div>${cat}`;
    btn.addEventListener('click', () => {
      if (state.activeCats.has(cat)) { state.activeCats.delete(cat); btn.classList.remove('active'); }
      else                           { state.activeCats.add(cat);    btn.classList.add('active');    }
      renderMarkers();
    });
    container.appendChild(btn);
  });
}

function refreshCatButtons() {
  const year    = PERIODS[state.periodIdx].year;
  const present = new Set((state.data[year] || []).map(f => {
    const { catNorm } = extractProps(f.properties || {}, year);
    return catNorm;
  }));
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.disabled = !present.has(btn.dataset.cat);
  });
}

// ═══════════════════════════════════════════════════════
//  THÈME
// ═══════════════════════════════════════════════════════
(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  let t = 'dark';
  document.documentElement.setAttribute('data-theme', t);
  setIcon(t);
  btn.addEventListener('click', () => {
    t = t === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
    setIcon(t);
    setTiles();
  });
  function setIcon(t) {
    btn.innerHTML = t === 'dark'
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  }
})();

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
async function init() {
  initSlider();
  initCatFilters();
  await loadPeriod(PERIODS[0]);
  renderMarkers();
  refreshCatButtons();
  setTimeout(() => { map.invalidateSize(); }, 100);
  const loading = document.getElementById('loading');
  loading.classList.add('fade-out');
  setTimeout(() => { loading.style.display = 'none'; }, 600);
}

init();
</script>
